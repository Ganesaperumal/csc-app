name: Sync ERP Jobs to Supabase

on:
  workflow_dispatch: # Allows manual triggering via GitHub API / Dashboard
  schedule:
    # Runs at 10:30 AM, 1:30 PM, 5:30 PM, and 8:30 PM IST (05:00, 08:00, 12:00, 15:00 UTC)
    # Changed minute from :30 to :00 to match your comment's intent, shifted by 5.5 hours for IST.
    - cron: '0 3,6,9,12,15 * * *' 

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Automatically caches node_modules if package-lock.json exists

      - name: Install Node Dependencies
        run: |
          cd scripts
          npm install

      - name: Cache Playwright Chromium Browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scripts/package-lock.json') }}

      - name: Install Playwright Chromium (Only if cache misses)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          cd scripts
          npx playwright install chromium --with-deps

      - name: Install Playwright System Dependencies (If cache hits)
        if: steps.playwright-cache.outputs.cache-hit == 'main' || steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          cd scripts
          npx playwright install-deps chromium

      - name: Run Playwright Sync Script
        env:
          ERP_USERNAME: ${{ secrets.ERP_USERNAME }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
          ERP_SITE: ${{ secrets.ERP_SITE }}
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET_KEY: ${{ secrets.CRON_SECRET_KEY }}
        run: |
          echo "GitHub Action successfully triggered!"
          cd scripts
          node github_sync.js
