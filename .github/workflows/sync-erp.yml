name: Sync ERP Jobs to Supabase

on:
  workflow_dispatch: # Allows manual triggering via GitHub API (from our Next.js dashboard)
  schedule:
    - cron: '0 1 * * *' # Also runs automatically at 1:00 AM every day

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright xlsx
          npx playwright install chromium

      # We can run the original Python script here, or a modified version that POSTs to our API
      # For now, this is a placeholder indicating where the script lives
      - name: Run Playwright Sync Script
        env:
          ERP_USERNAME: ${{ secrets.ERP_USERNAME }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
          ERP_SITE: ${{ secrets.ERP_SITE }}
          API_URL: ${{ secrets.API_URL }}
          CRON_SECRET_KEY: ${{ secrets.CRON_SECRET_KEY }}
        run: |
          echo "GitHub Action successfully triggered by Vercel Dashboard!"
          node scripts/github_sync.js
