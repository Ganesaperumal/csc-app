<!DOCTYPE html>
<html class="dark-theme">
<head>
<style>
:root {
  --bg-color: #ffffff;
}
.dark-theme body {
  --bg-color: #030712;
}
body {
  background-color: var(--bg-color);
  color: white;
}
</style>
</head>
<body>
  <h1>Hello</h1>
  <div style="background-image: linear-gradient(var(--bg-color), var(--bg-color)); width: 100px; height: 100px; border: 1px solid red;">
    Test
  </div>
</body>
</html>
