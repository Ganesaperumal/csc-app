<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Globe Base -->
  <circle cx="60" cy="40" r="20" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  
  <!-- Longitude / Latitude Lines -->
  <ellipse cx="60" cy="40" rx="10" ry="20" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="80" y2="40" stroke="#0ea5e9" stroke-width="1.5"/>
  
  <!-- Top Red Arrow -->
  <path d="M 33 40 C 33 20, 87 20, 87 40" fill="none" stroke="#e11d48" stroke-width="3"/>
  <polygon points="87,40 82,32 92,32" fill="#e11d48"/>
  
  <!-- Bottom Red Arrow -->
  <path d="M 87 40 C 87 60, 33 60, 33 40" fill="none" stroke="#e11d48" stroke-width="3"/>
  <polygon points="33,40 28,48 38,48" fill="#e11d48"/>
  
  <!-- CSC Text -->
  <text x="60" y="95" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#0f172a" text-anchor="middle" letter-spacing="2">CSC</text>
</svg>
